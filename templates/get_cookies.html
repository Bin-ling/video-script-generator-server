<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>获取抖音 Cookies</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
        body{background:#f5f7fa;padding:30px}
        .container{max-width:800px;margin:0 auto}
        .card{background:#fff;border-radius:16px;padding:26px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06)}
        h1{font-size:24px;margin-bottom:10px}
        .step{margin:20px 0;padding:20px;background:#f9fafb;border-radius:12px}
        .step h3{color:#0071e3;margin-bottom:10px}
        code{background:#eee;padding:2px 6px;border-radius:4px}
        textarea{width:100%;height:150px;border:1px solid #eaeaea;border-radius:12px;padding:16px;margin:10px 0}
        button{background:#0071e3;color:#fff;border:none;padding:14px 28px;border-radius:12px;cursor:pointer}
        .success{color:#22c55e}
        .error{color:#ef4444}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🍪 获取抖音 Cookies</h1>
            <p style="color:#666;margin-bottom:20px">按照以下步骤获取抖音登录 cookies</p>
        </div>

        <div class="card">
            <div class="step">
                <h3>步骤 1：打开抖音网站</h3>
                <p>在浏览器中访问 <a href="https://www.douyin.com/" target="_blank">https://www.douyin.com/</a></p>
            </div>

            <div class="step">
                <h3>步骤 2：登录账号</h3>
                <p>使用你的抖音账号登录</p>
            </div>

            <div class="step">
                <h3>步骤 3：打开开发者工具</h3>
                <p>按 <code>F12</code> 或右键 → 检查</p>
            </div>

            <div class="step">
                <h3>步骤 4：复制 Cookies</h3>
                <p>在开发者工具中：</p>
                <ol style="margin-left:20px;margin-top:10px">
                    <li>切换到 <code>Application</code> 标签</li>
                    <li>左侧选择 <code>Cookies</code> → <code>https://www.douyin.com</code></li>
                    <li>全选所有 cookies 并复制</li>
                </ol>
            </div>

            <div class="step">
                <h3>步骤 5：粘贴 Cookies</h3>
                <form method="POST" action="/save_cookies">
                    <textarea name="cookies" placeholder="在此粘贴 cookies 字符串..."></textarea>
                    <br>
                    <button type="submit">保存 Cookies</button>
                </form>
            </div>

            <div class="step">
                <h3>步骤 6：测试</h3>
                <p>保存后返回 <a href="/">首页</a> 测试视频下载</p>
            </div>
        </div>
    </div>
</body>
</html>
